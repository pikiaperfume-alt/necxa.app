name: necxa_flutter
description: "Necxa Financial Mission Control"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  supabase_flutter: ^2.12.2
  device_info_plus: ^9.0.3
  geolocator: ^9.0.2
  local_auth: ^2.1.6
  connectivity_plus: ^6.0.3
  lottie: ^3.1.2
  http: ^1.1.0
  intl: ^0.17.0
  image_picker: ^1.1.2
  file_picker: ^8.1.3
  path_provider: ^2.1.4
  path: ^1.9.1
  dio: ^5.4.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5
  sqflite: ^2.4.1
  share_plus: ^12.0.2
  record: ^5.0.4
  just_audio: ^0.9.40
  flutter_contacts: ^1.1.9+1
  permission_handler: ^11.3.1
  flutter_ringtone_player: ^4.0.0+4
  camera: ^0.12.0+1
  video_player: ^2.8.1
  audioplayers: ^6.0.0
  image: ^4.0.0
  photo_view: ^0.14.0
  video_thumbnail: ^0.5.0
  audio_waveforms: ^1.1.2
  video_compress: ^3.1.4
  flutter_local_notifications: ^17.1.1
  firebase_core: ^3.2.0
  cloud_firestore: ^5.0.2
  firebase_auth: ^5.1.1
  cloud_functions: ^5.6.2
  flutter_cache_manager: ^3.4.1
  ffmpeg_kit_flutter_min_gpl: ^6.0.3-LTS
  agora_rtc_engine: ^6.3.0
  mongo_dart: ^0.10.1
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon_padded.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon_padded.png"
  web:
    generate: true
    image_path: "assets/images/app_icon_padded.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
  windows:
    generate: true
    image_path: "assets/images/app_icon_padded.png"



flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/shaders/

dependency_overrides:
  record_platform_interface: 1.1.0
  ffmpeg_kit_flutter_min_gpl:
    path: plugins/ffmpeg_kit_flutter_min_gpl
